name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Supersede in-flight runs on the same ref — faster tip feedback, less minute burn.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Hard static gates + Vitest (fail-fast via parallel gates script).
  # Smoke stays workflow_dispatch-only (see smoke job).
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static gates (parallel)
        run: npm run test:gates

      - name: Unit tests
        run: npx vitest run

  # Build parallel to test — avoids sequential full install+test+build wall clock.
  # Hard gates stay in `test`; this job only proves Vite production build.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # Playwright smoke is on-demand only — day-to-day chrome QA is local MCP/agent.
  # Auto-running smoke on every push burned Actions minutes and still missed REC⊗CJM.
  smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npm run dev -- --host 127.0.0.1 --port 5173 &

      - name: Wait for dev server
        run: |
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:5173 > /dev/null && exit 0
            sleep 1
          done
          echo "Dev server did not start"
          exit 1

      - name: Playwright smoke (lean CI profile)
        env:
          PROTO_SMOKE_URL: http://127.0.0.1:5173
          PROTO_SMOKE_PROFILE: ci
        run: npm run smoke

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: scripts/playwright-out/smoke-report.json
