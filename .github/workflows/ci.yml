name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  # Playwright smoke is on-demand only — day-to-day chrome QA is local MCP/agent.
  # Auto-running smoke on every push burned Actions minutes and still missed REC⊗CJM.
  smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npm run dev -- --host 127.0.0.1 --port 5173 &

      - name: Wait for dev server
        run: |
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:5173 > /dev/null && exit 0
            sleep 1
          done
          echo "Dev server did not start"
          exit 1

      - name: Playwright smoke (lean CI profile)
        env:
          PROTO_SMOKE_URL: http://127.0.0.1:5173
          PROTO_SMOKE_PROFILE: ci
        run: npm run smoke

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: proto-smoke-report
          path: scripts/playwright-out/proto-smoke-report.json
