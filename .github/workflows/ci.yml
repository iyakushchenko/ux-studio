name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Supersede in-flight runs on the same ref — faster tip feedback; agents must not wait on stale CI.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # 2-core ubuntu-latest: bound Vitest workers to avoid fork thrash.
  VITEST_MAX_WORKERS: "2"

jobs:
  # Hard static gates + Vitest (fail-fast via parallel gates script).
  # Smoke stays workflow_dispatch-only (see smoke job).
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Warm path: restore node_modules and skip npm ci (biggest wall-clock win).
      - name: Cache node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund

      - name: Static gates (parallel)
        run: npm run test:gates

      - name: Unit tests
        run: npx vitest run --pool=forks --maxWorkers=${{ env.VITEST_MAX_WORKERS }}

  # Build parallel to test — one Vite prove; not sequential after unit.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

  # Playwright smoke is on-demand only — day-to-day chrome QA is local MCP/agent.
  smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.nm.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npm run dev -- --host 127.0.0.1 --port 5173 &

      - name: Wait for dev server
        run: |
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:5173 > /dev/null && exit 0
            sleep 1
          done
          echo "Dev server did not start"
          exit 1

      - name: Playwright smoke (lean CI profile)
        env:
          PROTO_SMOKE_URL: http://127.0.0.1:5173
          PROTO_SMOKE_PROFILE: ci
        run: npm run smoke

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: scripts/playwright-out/smoke-report.json
